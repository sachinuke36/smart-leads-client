services:
  mongodb:
    image: mongo:7
    container_name: smart-leads-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=smart-leads
    networks:
      - smart-leads-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: smart-leads-server
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/smart-leads
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - CORS_ORIGIN=${CORS_ORIGIN:-https://yourdomain.com}
    networks:
      - smart-leads-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: smart-leads-client
    restart: unless-stopped
    depends_on:
      - server
    networks:
      - smart-leads-network

  nginx:
    image: nginx:alpine
    container_name: smart-leads-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - client
    networks:
      - smart-leads-network

  certbot:
    image: certbot/certbot
    container_name: smart-leads-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  mongodb_data:

networks:
  smart-leads-network:
    driver: bridge
