services:
  mongodb:
    image: mongo:7
    container_name: smart-leads-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=smart-leads
    networks:
      - smart-leads-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: smart-leads-server
    restart: unless-stopped
    ports:
      - "5001:5000"
    depends_on:
      - mongodb
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/smart-leads
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-key-change-in-production}
      - JWT_EXPIRES_IN=7d
      - CORS_ORIGIN=http://localhost
    networks:
      - smart-leads-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: smart-leads-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - smart-leads-network

volumes:
  mongodb_data:

networks:
  smart-leads-network:
    driver: bridge
